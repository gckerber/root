# .github/workflows/deploy-water-portal.yml
# Deploys Site 2 (Water Payment Portal) to Azure Static Web Apps + Azure Functions

name: Deploy Water Portal

on:
  push:
    branches: [main]
    paths:
      - 'apps/water-portal/**'
      - 'functions/water-api/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-water-portal.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-water-prod-${{ secrets.UNIQUE_SUFFIX }}
  AZURE_FUNCTIONAPP_PACKAGE_PATH: functions/water-api
  NODE_VERSION: '18.x'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & lint frontend
        working-directory: apps/water-portal
        run: |
          npm ci
          npm run lint --if-present

      - name: Install function dependencies
        working-directory: functions/water-api
        run: npm ci

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep Infrastructure
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: eastus2
          template: infrastructure/main.bicep
          parameters: >
            infrastructure/main.bicepparam
            adminEmail=${{ secrets.ADMIN_EMAIL }}
            contactEmail=${{ secrets.CONTACT_EMAIL }}
          failOnStdErr: false

  deploy-frontend:
    name: Deploy Water Portal Frontend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Build Frontend
        working-directory: apps/water-portal
        env:
          VITE_API_BASE_URL: ${{ secrets.WATER_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.WATER_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/water-portal
          output_location: dist
          skip_api_build: true

  deploy-functions:
    name: Deploy Water Functions
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install function dependencies
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: npm ci --production

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          respect-funcignore: true

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-functions]
    steps:
      - name: Wait for propagation
        run: sleep 30

      - name: Check water portal is up
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.WATER_HOSTNAME }})
          if [ "$STATUS" != "200" ]; then
            echo "Water portal returned HTTP $STATUS"
            exit 1
          fi
          echo "Water portal is live — HTTP 200 OK"
