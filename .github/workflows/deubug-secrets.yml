name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check all secrets
        run: |
          echo "=== Checking all secrets ==="
          echo ""

          check_secret() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "❌ $name = (NOT SET or EMPTY)"
            else
              echo "✅ $name = (set, ${#value} chars) first 4: ${value:0:4}..."
            fi
          }

          check_secret "AZURE_CREDENTIALS"            "$AZURE_CREDENTIALS"
          check_secret "ADMIN_EMAIL"                  "$ADMIN_EMAIL"
          check_secret "CONTACT_EMAIL"                "$CONTACT_EMAIL"
          check_secret "VILLAGE_STATIC_WEB_APP_TOKEN" "$VILLAGE_STATIC_WEB_APP_TOKEN"
          check_secret "WATER_STATIC_WEB_APP_TOKEN"   "$WATER_STATIC_WEB_APP_TOKEN"
          check_secret "ADMIN_STATIC_WEB_APP_TOKEN"   "$ADMIN_STATIC_WEB_APP_TOKEN"
          check_secret "VILLAGE_HOSTNAME"             "$VILLAGE_HOSTNAME"
          check_secret "WATER_HOSTNAME"               "$WATER_HOSTNAME"
          check_secret "VITE_ADMIN_USERNAME"          "$VITE_ADMIN_USERNAME"
          check_secret "VITE_ADMIN_PASSWORD"          "$VITE_ADMIN_PASSWORD"
          check_secret "VITE_API_BASE_URL"            "$VITE_API_BASE_URL"
          check_secret "ADMIN_API_KEY"                "$ADMIN_API_KEY"

        env:
          AZURE_CREDENTIALS:            ${{ secrets.AZURE_CREDENTIALS }}
          ADMIN_EMAIL:                  ${{ secrets.ADMIN_EMAIL }}
          CONTACT_EMAIL:                ${{ secrets.CONTACT_EMAIL }}
          VILLAGE_STATIC_WEB_APP_TOKEN: ${{ secrets.VILLAGE_STATIC_WEB_APP_TOKEN }}
          WATER_STATIC_WEB_APP_TOKEN:   ${{ secrets.WATER_STATIC_WEB_APP_TOKEN }}
          ADMIN_STATIC_WEB_APP_TOKEN:   ${{ secrets.ADMIN_STATIC_WEB_APP_TOKEN }}
          VILLAGE_HOSTNAME:             ${{ secrets.VILLAGE_HOSTNAME }}
          WATER_HOSTNAME:               ${{ secrets.WATER_HOSTNAME }}
          VITE_ADMIN_USERNAME:          ${{ secrets.VITE_ADMIN_USERNAME }}
          VITE_ADMIN_PASSWORD:          ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_API_BASE_URL:            ${{ secrets.VITE_API_BASE_URL }}
          ADMIN_API_KEY:                ${{ secrets.ADMIN_API_KEY }}