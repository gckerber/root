name: Deploy PD Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/pd-site/**'
      - '.github/workflows/deploy-pd-site.yml'
  workflow_dispatch:

jobs:
  deploy-site:
    name: Build & Deploy PD Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install frontend dependencies
        working-directory: apps/pd-site
        run: npm install

      - name: Build frontend
        working-directory: apps/pd-site
        env:
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: Install API dependencies
        working-directory: apps/pd-site/api
        run: npm install

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.PD_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/pd-site
          api_location: apps/pd-site/api
          output_location: dist
