name: Deploy Village API (C#)

on:
  push:
    branches: [main]
    paths:
      - 'functions/village-api/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  FUNCTION_APP_NAME: func-village-prod

jobs:
  build-and-deploy:
    name: Build & Deploy C# Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions/village-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore village-api.csproj

      - name: Build
        run: dotnet build village-api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish village-api.csproj --configuration Release --no-build --output ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: functions/village-api/publish