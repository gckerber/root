name: Deploy Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install & Build
        working-directory: apps/admin
        env:
          VITE_API_BASE_URL: ''
          VITE_ADMIN_USERNAME: admin
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_VILLAGE_URL: https://${{ secrets.VILLAGE_HOSTNAME }}
        run: |
          npm install
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.ADMIN_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/admin/dist   # point directly at the built output
          output_location: ''             # already built — nothing to output
          skip_app_build: true            # DO NOT rebuild — use our build above
