name: Deploy Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Debug env and build
        working-directory: apps/admin
        env:
          VITE_API_BASE_URL: https://${{ secrets.VITE_API_BASE_URL }}
          VITE_ADMIN_USERNAME: admin
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_VILLAGE_URL: https://${{ secrets.VILLAGE_HOSTNAME }}
        run: |
          echo "=== .env.production contents ==="
          cat .env.production || echo "No .env.production file"
          echo ""
          echo "=== VITE_API_BASE_URL ==="
          echo "Length: ${#VITE_API_BASE_URL}"
          echo "Value: $VITE_API_BASE_URL"
          echo ""
          npm install
          npm run build
          echo ""
          echo "=== Checking built output ==="
          grep -ro 'func-village' dist/ | head -3 || echo "❌ func-village NOT in dist"
          grep -ro 'azurewebsites' dist/ | head -3 || echo "❌ azurewebsites NOT in dist"
          grep -o '.{0,20}API_BASE.{0,30}' dist/assets/*.js | head -3 || echo "❌ API_BASE not found in dist"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.ADMIN_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/admin/dist
          output_location: ''
          skip_app_build: true