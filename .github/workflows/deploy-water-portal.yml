name: Deploy Water Portal

on:
  push:
    branches: [main]
    paths:
      - 'apps/water-portal/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-water-portal.yml'
  workflow_dispatch:

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep Infrastructure
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: eastus2
          template: infrastructure/main.bicep
          parameters: >
            environment=prod
            adminEmail=${{ secrets.ADMIN_EMAIL }}
            contactEmail=${{ secrets.CONTACT_EMAIL }}
          failOnStdErr: false

  deploy-site:
    name: Build & Deploy Water Portal
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install frontend dependencies
        working-directory: apps/water-portal
        run: npm install

      - name: Build frontend
        working-directory: apps/water-portal
        env:
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: Install API dependencies
        working-directory: apps/water-portal/api
        run: npm install

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.WATER_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/water-portal
          api_location: apps/water-portal/api
          output_location: dist

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-site
    steps:
      - name: Wait for propagation
        run: sleep 30
      - name: Check portal is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.WATER_HOSTNAME }})
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Water portal is live" || (echo "❌ Status $STATUS" && exit 1)
