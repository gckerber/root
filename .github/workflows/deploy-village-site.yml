# .github/workflows/deploy-village-site.yml
# Deploys Site 1 — Village Site
# Functions live in apps/village-site/api (SWA managed, zero quota needed)

name: Deploy Village Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/village-site/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy-village-site.yml'
  workflow_dispatch:

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep Infrastructure
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: eastus2
          template: infrastructure/main.bicep
          parameters: >
            environment=prod
            adminEmail=${{ secrets.ADMIN_EMAIL }}
            contactEmail=${{ secrets.CONTACT_EMAIL }}
          failOnStdErr: false

  deploy-site:
    name: Build & Deploy Village Site
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install frontend dependencies
        working-directory: apps/village-site
        run: npm ci

      - name: Build frontend
        working-directory: apps/village-site
        env:
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.VILLAGE_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/village-site
          api_location: apps/village-site/api      # SWA managed functions
          output_location: dist

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-site
    steps:
      - name: Wait for propagation
        run: sleep 30
      - name: Check site is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.VILLAGE_HOSTNAME }})
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Village site is live" || (echo "❌ Unexpected status $STATUS" && exit 1)
